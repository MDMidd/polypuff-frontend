<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#fff" stroke-width="1">
    <line x1="0" y1="256" x2="1024" y2="256"/>
    <line x1="0" y1="512" x2="1024" y2="512"/>
    <line x1="0" y1="768" x2="1024" y2="768"/>
    <line x1="256" y1="0" x2="256" y2="1024"/>
    <line x1="512" y1="0" x2="512" y2="1024"/>
    <line x1="768" y1="0" x2="768" y2="1024"/>
  </g>
  
  <!-- Glow effect behind icon -->
  <circle cx="512" cy="480" r="240" fill="#10B981" opacity="0.08"/>
  
  <!-- Globe / Translation symbol -->
  <circle cx="512" cy="440" r="160" fill="none" stroke="url(#accent)" stroke-width="12" opacity="0.9"/>
  <!-- Globe horizontal line -->
  <ellipse cx="512" cy="440" rx="160" ry="60" fill="none" stroke="url(#accent)" stroke-width="8" opacity="0.5"/>
  <!-- Globe vertical line -->
  <ellipse cx="512" cy="440" rx="60" ry="160" fill="none" stroke="url(#accent)" stroke-width="8" opacity="0.5"/>
  <!-- Globe center dot -->
  <circle cx="512" cy="440" r="12" fill="#34D399"/>
  
  <!-- Letter "T" for Translation / Trainer -->
  <text x="512" y="475" font-family="Arial, Helvetica, sans-serif" font-size="180" font-weight="900" fill="url(#accent)" text-anchor="middle" letter-spacing="-8">T</text>
  
  <!-- Small speech bubbles -->
  <g transform="translate(660, 320)">
    <rect x="0" y="0" width="80" height="50" rx="12" fill="url(#blue)" opacity="0.8"/>
    <polygon points="20,50 30,65 40,50" fill="#3B82F6" opacity="0.8"/>
    <text x="40" y="33" font-family="Arial" font-size="22" fill="#fff" text-anchor="middle" font-weight="700">EN</text>
  </g>
  
  <g transform="translate(280, 320)">
    <rect x="0" y="0" width="80" height="50" rx="12" fill="#F59E0B" opacity="0.6"/>
    <polygon points="40,50 50,65 60,50" fill="#F59E0B" opacity="0.6"/>
    <text x="40" y="33" font-family="Arial" font-size="22" fill="#fff" text-anchor="middle" font-weight="700">ES</text>
  </g>
  
  <!-- Arrow between bubbles -->
  <line x1="370" y1="345" x2="650" y2="345" stroke="#10B981" stroke-width="4" stroke-dasharray="8,6" opacity="0.4"/>
  
  <!-- Bottom text -->
  <text x="512" y="720" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="800" fill="#F8FAFC" text-anchor="middle" letter-spacing="6">TRANSLATION</text>
  <text x="512" y="780" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="600" fill="#10B981" text-anchor="middle" letter-spacing="10">TRAINER</text>
</svg>
